---
# ─────────────────────────────────────────
# SWAYFX — ОКРУЖЕНИЕ (Ubuntu 26)
# SwayFX 0.5.3 / wlroots 0.19.0 / scenefx 0.4.1
# ─────────────────────────────────────────

- name: Установить зависимости для сборки SwayFX
  apt:
    name:
      - waybar
      - rofi
      - sway-notification-center
      - libgtk-3-dev
      - libglib2.0-dev
      - libgtk-layer-shell-dev
      - golang
      # Инструменты сборки
      - meson
      - pkg-config
      - cmake
      - git
      - scdoc
      # Wayland
      - wayland-protocols
      - libwayland-dev
      - libpcre2-dev
      - libjson-c-dev
      # Графика и рендеринг
      - libpango1.0-dev
      - libcairo2-dev
      - libgdk-pixbuf-2.0-dev
      - libdrm-dev
      - libgbm-dev
      - libgles2-mesa-dev
      - libpixman-1-dev
      # Ввод и сиденье
      - libinput-dev
      - libseat-dev
      - libxkbcommon-dev
      # XCB
      - libxcb-dri3-dev
      - libxcb-present-dev
      - libxcb-res0-dev
      - libxcb-render-util0-dev
      - libxcb-ewmh-dev
      - libxcb-icccm4-dev
      # Новые зависимости wlroots 0.19
      - libliftoff-dev
      - libdisplay-info-dev
      - liblcms2-dev
    state: present
    update_cache: true

# ── SwayFX 0.5.3 (сборка из исходников с подпроектами meson) ──
- name: Клонировать репозиторий SwayFX 0.5.3
  git:
    repo: https://github.com/WillPower3309/swayfx
    dest: /tmp/swayfx
    version: "0.5.3"
    force: true

- name: Удалить старую build-директорию SwayFX если есть
  file:
    path: /tmp/swayfx/build
    state: absent

- name: Создать директорию subprojects SwayFX
  file:
    path: /tmp/swayfx/subprojects
    state: directory
    mode: '0755'

- name: Клонировать scenefx 0.4.1 как подпроект SwayFX
  git:
    repo: https://github.com/wlrfx/scenefx
    dest: /tmp/swayfx/subprojects/scenefx
    version: "0.4.1"
    force: true

- name: Создать директорию subprojects внутри scenefx
  file:
    path: /tmp/swayfx/subprojects/scenefx/subprojects
    state: directory
    mode: '0755'

- name: Клонировать wlroots (ветка 0.19, свежий коммит с фиксом libinput)
  git:
    repo: https://gitlab.freedesktop.org/wlroots/wlroots.git
    dest: /tmp/swayfx/subprojects/scenefx/subprojects/wlroots
    version: "0.19"          # берём HEAD ветки 0.19, а не тег 0.19.0
    force: true

- name: Настроить сборку SwayFX
  command: >
    meson setup build
    --prefix=/usr/local
    --wrap-mode=default
    --force-fallback-for=scenefx,wlroots
    -Dsd-bus-provider=basu
  args:
    chdir: /tmp/swayfx

- name: Собрать SwayFX
  command: ninja -C build
  args:
    chdir: /tmp/swayfx

- name: Установить SwayFX
  command: ninja -C build install
  args:
    chdir: /tmp/swayfx

- name: Обновить ldconfig после установки SwayFX
  command: ldconfig
  changed_when: false


# ── nwg-dock (сборка из исходников) ──
- name: Клонировать репозиторий nwg-dock
  git:
    repo: https://github.com/nwg-piotr/nwg-dock
    dest: /tmp/nwg-dock
    version: main

- name: Собрать nwg-dock
  command: make build
  args:
    chdir: /tmp/nwg-dock
    creates: /tmp/nwg-dock/nwg-dock

- name: Установить nwg-dock
  command: make install
  args:
    chdir: /tmp/nwg-dock
    creates: /usr/local/bin/nwg-dock

# ── JetBrainsMono Nerd Font ──
- name: Создать директорию для шрифтов
  file:
    path: "{{ target_home }}/.local/share/fonts/JetBrainsMonoNerd"
    state: directory
    owner: "{{ target_user }}"
    mode: '0755'

- name: Скачать JetBrainsMono Nerd Font
  get_url:
    url: https://github.com/ryanoasis/nerd-fonts/releases/latest/download/JetBrainsMono.zip
    dest: /tmp/JetBrainsMono.zip

- name: Распаковать шрифты
  unarchive:
    src: /tmp/JetBrainsMono.zip
    dest: "{{ target_home }}/.local/share/fonts/JetBrainsMonoNerd"
    remote_src: true
    owner: "{{ target_user }}"

- name: Обновить кэш шрифтов
  command: fc-cache -fv
  become_user: "{{ target_user }}"
  changed_when: false
